name: bevry
'on':
  - push
  - pull_request
jobs:
  test:
    permissions:
      contents: read
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node:
          - '22'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install desired Node.js version
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Verify Node.js Versions
        run: >-
          printf '%s' 'node: ' && node --version && printf '%s' 'npm: ' && npm
          --version && node -e 'console.log(process.versions)'
      - run: npm run our:setup
      - run: npm run our:compile
      - run: npm run our:verify
      - name: Install targeted Node.js
        if: ${{ matrix.node != 22 }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Verify Node.js Versions
        run: >-
          printf '%s' 'node: ' && node --version && printf '%s' 'npm: ' && npm
          --version && node -e 'console.log(process.versions)'
      - run: npm test
  publish:
    permissions:
      contents: read
    if: ${{ github.event_name == 'push' }}
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install desired Node.js version
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Verify Node.js Versions
        run: >-
          printf '%s' 'node: ' && node --version && printf '%s' 'npm: ' && npm
          --version && node -e 'console.log(process.versions)'
      - run: npm run our:setup
      - run: npm run our:compile
      - run: npm run our:meta
      # TODO: re-enable once NPM_AUTH_TOKEN secret is regenerated
      # - name: publish to npm
      #   uses: bevry-actions/npm@v1.1.7
      #   with:
      #     npmAuthToken: ${{ secrets.NPM_AUTH_TOKEN }}
      #     npmBranchTag: ':next'
      - name: publish to surge
        uses: bevry-actions/surge@03b6898c53a5eb1166f68054b6dfa7d141bd7858 # v1.1.0
        with:
          surgeLogin: ${{ secrets.SURGE_LOGIN }}
          surgeToken: ${{ secrets.SURGE_TOKEN }}
  automerge:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
